<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModicaAI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #FAFAFA; color: #1A1A2E; min-height: 100vh; display: flex; flex-direction: column; }
  .top-bar { display: flex; justify-content: flex-end; padding: 16px 24px 0; }
  .lang-toggle { display: flex; gap: 4px; background: #EFEFEF; border-radius: 8px; padding: 3px; }
  .lang-btn { padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: #888; transition: all 0.18s; font-family: 'DM Sans', sans-serif; }
  .lang-btn.active { background: #fff; color: #1A3A5C; font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.10); }
  .center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 20px 80px; transition: all 0.4s ease; }
  .center.shifted { justify-content: flex-start; padding-top: 40px; }
  .logo { margin-bottom: 36px; text-align: center; transition: all 0.4s ease; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; color: #1A3A5C; letter-spacing: -1px; }
  .logo-text span { color: #C8860A; }
  .logo-sub { font-size: 14px; color: #AAA; font-weight: 300; margin-top: 4px; letter-spacing: 0.3px; }
  .center.shifted .logo { margin-bottom: 24px; }
  .center.shifted .logo-text { font-size: 32px; }
  .center.shifted .logo-sub { font-size: 12px; }
  .search-wrap { width: 100%; max-width: 580px; }
  .search-box { display: flex; align-items: center; background: #fff; border: 1.5px solid #E0E0E0; border-radius: 28px; padding: 0 8px 0 22px; height: 52px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: box-shadow 0.2s, border-color 0.2s; }
  .search-box:focus-within { border-color: #1A3A5C; box-shadow: 0 4px 16px rgba(26,58,92,0.12); }
  .search-box input { flex: 1; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 16px; color: #1A1A2E; background: transparent; }
  .search-box input::placeholder { color: #C0C0C0; }
  .btn-send { width: 38px; height: 38px; border-radius: 20px; background: #1A3A5C; border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.18s; flex-shrink: 0; }
  .btn-send:hover { background: #C8860A; }
  .chat-area { width: 100%; max-width: 580px; margin-top: 28px; display: flex; flex-direction: column; gap: 20px; }
  .msg { animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-user { text-align: right; }
  .msg-user span { display: inline-block; background: #1A3A5C; color: #fff; padding: 10px 16px; border-radius: 18px 18px 4px 18px; font-size: 14px; max-width: 80%; text-align: left; }
  .msg-ai { font-size: 14px; line-height: 1.7; color: #1A1A2E; }
  .msg-ai strong { color: #1A3A5C; }
  .source-badge { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .source-local  { background: #EAF2F8; color: #1A3A5C; }
  .source-wiki   { background: #F5F5F5; color: #555; }
  .source-google { background: #FFF3E0; color: #E65100; }
  .wiki-card { margin-top: 12px; background: #fff; border: 1.5px solid #E8E8E8; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .wiki-card-title { font-weight: 600; font-size: 15px; color: #1A3A5C; margin-bottom: 8px; }
  .wiki-card-extract { font-size: 13px; line-height: 1.65; color: #444; margin-bottom: 10px; }
  .wiki-card-link { font-size: 12px; color: #C8860A; text-decoration: none; font-weight: 500; }
  .wiki-card-link:hover { text-decoration: underline; }
  .google-card { margin-top: 12px; background: #fff; border: 1.5px solid #E8E8E8; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .google-card-text { font-size: 13px; color: #666; line-height: 1.5; }
  .google-card-text strong { color: #1A1A2E; }
  .btn-google { display: flex; align-items: center; gap: 6px; background: #1A3A5C; color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; text-decoration: none; transition: background 0.18s; flex-shrink: 0; }
  .btn-google:hover { background: #C8860A; }
  .typing { display: flex; gap: 5px; align-items: center; height: 24px; }
  .dot { width: 6px; height: 6px; background: #C0C8D4; border-radius: 50%; animation: pulse 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 60%, 100% { opacity: 0.3; transform: scale(1); } 30% { opacity: 1; transform: scale(1.3); } }
  footer { text-align: center; padding: 16px; font-size: 12px; color: #CCC; }
  footer a { color: #CCC; text-decoration: none; }
  footer a:hover { color: #1A3A5C; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang(this,'it')">IT</button>
    <button class="lang-btn" onclick="setLang(this,'en')">EN</button>
  </div>
</div>

<div class="center" id="center">
  <div class="logo" id="logo">
    <div class="logo-text">Modica<span>AI</span></div>
    <div class="logo-sub" id="logoSub">Il tuo assistente locale per Modica</div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Chiedimi qualcosa..." autocomplete="off">
      <button class="btn-send" id="sendBtn">→</button>
    </div>
    <div class="chat-area" id="chatArea"></div>
  </div>
</div>

<footer>
  <a href="https://modicaai.it">modicaai.it</a> &nbsp;·&nbsp; Modica, Sicilia
  <br>
  <span style="font-size:11px;">© 2026 ModicaAI — <a href="mailto:info@modicaai.it">info@modicaai.it</a></span>
</footer>

<script>
// ══════════════════════════════════════════════════════════════════
// ⚙️  CONFIGURAZIONE — CAMBIA SOLO QUESTA RIGA DOPO IL DEPLOY
// ══════════════════════════════════════════════════════════════════
const API_URL = "https://modicaai-api.onrender.com";
// ══════════════════════════════════════════════════════════════════

const txt = {
  it: {
    placeholder:   'Chiedimi qualcosa...',
    sub:           'Il tuo assistente locale per Modica',
    sourceLocal:   '🤖 ModicaAI',
    sourceWiki:    '📖 Wikipedia',
    sourceGoogle:  '🔍 Google',
    wikiReadMore:  'Leggi su Wikipedia →',
    googleMsg:     (q) => `Per "<strong>${q}</strong>" ti porto su Google per i risultati più aggiornati.`,
    googleBtn:     'Cerca su Google',
    errore:        'Errore di connessione. Riprova tra qualche secondo.',
  },
  en: {
    placeholder:   'Ask me anything...',
    sub:           'Your local assistant for Modica',
    sourceLocal:   '🤖 ModicaAI',
    sourceWiki:    '📖 Wikipedia',
    sourceGoogle:  '🔍 Google',
    wikiReadMore:  'Read on Wikipedia →',
    googleMsg:     (q) => `For "<strong>${q}</strong>" I'll take you to Google for the latest results.`,
    googleBtn:     'Search on Google',
    errore:        'Connection error. Please try again.',
  }
};

let lang = 'it';

function setLang(btn, l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').placeholder = txt[l].placeholder;
  document.getElementById('logoSub').textContent = txt[l].sub;
}

// ── Parole chiave: domanda riguarda Modica? ───────────────────────
const MODICA_KEYWORDS = [
  'modica','modicano','modicana','muricani','contea','val di noto','ragusa',
  'san giorgio','san pietro','duomo','bonajuto','cioccolato',
  'cava ispica','castello','comune','anagrafe','municipio','urp','tari','imu',
  'farmacia','ospedale','guardia medica','teatro garibaldi','museo',
  'vasa vasa','infiorata','chocobarocco','quasimodo','bufalino',
  'ristorante','trattoria','accursio','fattoria delle torri',
];

// Parole chiave: domanda enciclopedica → Wikipedia
const WIKI_KEYWORDS = [
  "cos'è","cosa è","chi è","chi era","storia di","come funziona",
  "significato","definizione","what is","who is","history of","how does",
  "spiegami","dimmi di","parlami di",
];

function isModicaQuery(q) { return MODICA_KEYWORDS.some(k => q.toLowerCase().includes(k)); }
function isWikiQuery(q)   { return WIKI_KEYWORDS.some(k => q.toLowerCase().includes(k)); }

// ── Wikipedia API ─────────────────────────────────────────────────
async function fetchWikipedia(query) {
  const wl = lang === 'en' ? 'en' : 'it';
  try {
    const res  = await fetch(`https://${wl}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
    if (!res.ok) return null;
    const data = await res.json();
    if (data.type === 'disambiguation' || !data.extract) return null;
    return {
      title:   data.title,
      extract: data.extract.slice(0, 400) + (data.extract.length > 400 ? '…' : ''),
      url:     data.content_urls?.desktop?.page || `https://${wl}.wikipedia.org/wiki/${encodeURIComponent(query)}`
    };
  } catch { return null; }
}

// ── Chiama il nostro backend Groq/Llama ───────────────────────────
async function fetchAPI(domanda) {
  const res = await fetch(`${API_URL}/ask`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ domanda }),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

// ── Rendering ─────────────────────────────────────────────────────
function formatText(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n•/g, '<br>•')
    .replace(/\n/g, '<br>');
}

function addMessage(type, html, badgeClass, badgeText) {
  const area = document.getElementById('chatArea');
  const div  = document.createElement('div');
  div.className = `msg msg-${type}`;
  div.innerHTML = type === 'user'
    ? `<span>${html}</span>`
    : `${html}<div><span class="source-badge ${badgeClass}">${badgeText}</span></div>`;
  area.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  document.getElementById('center').classList.add('shifted');
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div  = document.createElement('div');
  div.id = 'typing'; div.className = 'msg msg-ai typing';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  area.appendChild(div);
}
function removeTyping() { document.getElementById('typing')?.remove(); }

// ── Motore principale ─────────────────────────────────────────────
async function ask(q) {
  q = q.trim();
  if (!q) return;
  document.getElementById('searchInput').value = '';
  addMessage('user', q, '', '');
  showTyping();

  // Tutto va all'AI — nessun filtro, nessun redirect Google
  try {
    const data = await fetchAPI(q);
    removeTyping();
    addMessage('ai',
      `<div class="msg-ai">${formatText(data.risposta)}</div>`,
      'source-local', txt[lang].sourceLocal
    );
  } catch {
    removeTyping();
    addMessage('ai',
      `<div class="msg-ai">${txt[lang].errore}</div>`,
      'source-local', txt[lang].sourceLocal
    );
  }
}
document.getElementById('sendBtn').onclick = () => ask(document.getElementById('searchInput').value);
document.getElementById('searchInput').onkeydown = e => { if (e.key === 'Enter') ask(e.target.value); };
</script>
</body>
</html>
