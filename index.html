  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setCategoria(btn, cat) {
  categoriaAttiva = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').placeholder = PLACEHOLDER[cat] || 'Chiedimi qualcosa...';
  document.getElementById('searchInput').focus();
}

function nuovaChat() {
  cronologia = [];
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('hero').classList.remove('hidden');
  document.getElementById('suggestionsGrid').style.display = '';
  document.getElementById('searchInput').value = '';
}

function formatText(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\* /g,'• ').replace(/\n/g,'<br>');
}

const copyIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;

function addMessage(type, html, badge, raw) {
  document.getElementById('hero').classList.add('hidden');
  document.getElementById('suggestionsGrid').style.display = 'none';
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  if (type === 'user') {
    div.innerHTML = `<span>${html}</span>`;
  } else {
    const cid = 'c' + Date.now();
    div.innerHTML = `
      <div class="msg-ai-wrap">
        <div class="msg-ai">${html}</div>
        <div class="msg-footer">
          <span class="source-badge">${badge}</span>
          <button class="btn-copy-msg" id="${cid}" onclick="copiaMsg(this)">${copyIcon} Copia</button>
        </div>
      </div>`;
    div.querySelector(`#${cid}`).dataset.t = raw || '';
  }
  area.appendChild(div);
  div.scrollIntoView({ behavior:'smooth', block:'end' });
}

function copiaMsg(btn) {
  navigator.clipboard.writeText(btn.dataset.t).then(() => {
    btn.textContent = '✅ Copiato!'; btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = copyIcon + ' Copia'; btn.classList.remove('copied'); }, 2000);
  });
}

function addDivider(label) {
  if (!label) return;
  const div = document.createElement('div');
  div.className = 'cat-divider'; div.textContent = label;
  document.getElementById('chatArea').appendChild(div);
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.id = 'typing'; div.className = 'msg';
  div.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  area.appendChild(div);
  div.scrollIntoView({ behavior:'smooth', block:'end' });
}
function removeTyping() { document.getElementById('typing')?.remove(); }

async function ask(q) {
  q = q.trim(); if (!q) return;
  document.getElementById('searchInput').value = '';

  const hints = { meteo:['meteo','tempo','pioggia','sole','caldo','freddo'], ristoranti:['ristorante','mangiare','cena','pranzo','pizzeria'], turismo:['vedere','visita','monumento','museo'], storia:['storia','origini'], farmacia:['farmacia'], hotel:['hotel','albergo'], bar:['bar','caffe','caffè'] };
  const labels = { meteo:'🌤 Meteo', ristoranti:'🍽 Ristoranti', turismo:'🏛 Turismo', storia:'📜 Storia', farmacia:'💊 Farmacie', hotel:'🏨 Hotel', bar:'☕ Bar' };

  let domanda = q;
  if (categoriaAttiva !== 'tutto' && !hints[categoriaAttiva]?.some(k => q.toLowerCase().includes(k))) {
    domanda = `${q} — categoria: ${categoriaAttiva}`;
    addDivider(labels[categoriaAttiva]);
  }

  // Traccia Analytics
  if (typeof gtag !== 'undefined') gtag('event', 'domanda', { event_category: 'chat', event_label: categoriaAttiva });

  addMessage('user', q, '');
  showTyping();

  // Aggiunge alla cronologia
  cronologia.push({ role: 'user', content: q });

  try {
    const res = await fetch(`${API_URL}/ask`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ domanda, cronologia: cronologia.slice(0,-1) })
    });
    const data = await res.json();
    removeTyping();
    addMessage('ai', formatText(data.risposta), '🤖 ModicaAI', data.risposta);
    // Salva risposta in cronologia
    cronologia.push({ role: 'assistant', content: data.risposta });
    // Mantieni max 20 messaggi in memoria
    if (cronologia.length > 20) cronologia = cronologia.slice(-20);
  } catch {
    removeTyping();
    addMessage('ai', 'Errore di connessione. Riprova.', '🤖 ModicaAI', '');
  }
}

document.getElementById('searchInput').onkeydown = e => { if (e.key === 'Enter') ask(e.target.value); };

function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('btnDark').innerHTML = isDark ? sunIcon : moonIcon;
  localStorage.setItem('modicaai-dark', isDark ? '1' : '0');
  document.querySelector('meta[name="theme-color"]').setAttribute('content', isDark ? '#151820' : '#1A3A5C');
}

// Ripristina preferenza al caricamento
(function() {
  if (localStorage.getItem('modicaai-dark') === '1') {
    document.body.classList.add('dark');
    document.getElementById('btnDark').innerHTML = sunIcon;
    document.querySelector('meta[name="theme-color"]').setAttribute('content', '#151820');
  }
})();
