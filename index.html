<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModicaAI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --white:      #FFFFFF;
    --bg:         #F8F8F8;
    --gold:       #B8860B;
    --gold-lt:    #D4A017;
    --terra:      #C1440E;
    --sky:        #1A3A5C;
    --ink:        #1A1A1A;
    --ink-mid:    #555555;
    --ink-soft:   #999999;
    --border:     #EBEBEB;
    --shadow-sm:  0 1px 4px rgba(0,0,0,0.06);
    --shadow-md:  0 4px 16px rgba(0,0,0,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Striscia animata in cima */
  .top-stripe {
    position: fixed; top:0; left:0; right:0; height:3px; z-index:400;
    background: linear-gradient(90deg, var(--sky), var(--gold), var(--terra), var(--gold), var(--sky));
    background-size: 300% 100%;
    animation: stripe 6s linear infinite;
  }
  @keyframes stripe { 0%{background-position:0%} 100%{background-position:300%} }

  /* Header */
  .header {
    position: fixed; top:3px; left:0; right:0; z-index:300;
    height: 56px;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    box-shadow: var(--shadow-sm);
  }

  .logo { display:flex; align-items:center; gap:10px; cursor:pointer; }
  .logo-mark {
    width:34px; height:34px; border-radius:10px;
    background: linear-gradient(135deg, var(--sky) 0%, #2a5a8c 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 2px 8px rgba(26,58,92,0.30);
    position:relative; overflow:hidden; flex-shrink:0;
  }
  .logo-mark::after {
    content:''; position:absolute; bottom:-4px; right:-4px;
    width:14px; height:14px; background:var(--gold);
    border-radius:50%; opacity:0.7;
  }
  .logo-mark svg { position:relative; z-index:1; }
  .logo-text-wrap { display:flex; flex-direction:column; line-height:1; }
  .logo-name { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; color:var(--ink); letter-spacing:0.3px; }
  .logo-name span { color:var(--gold); }
  .logo-tagline { font-size:9px; font-weight:500; letter-spacing:1.8px; text-transform:uppercase; color:var(--ink-soft); margin-top:1px; }

  .lang-toggle { display:flex; gap:2px; background:var(--bg); border-radius:8px; padding:3px; border:1px solid var(--border); }
  .lang-btn { padding:4px 11px; border-radius:6px; font-size:11px; font-weight:600; letter-spacing:0.5px; cursor:pointer; border:none; background:transparent; color:var(--ink-soft); transition:all 0.18s; font-family:'Outfit',sans-serif; text-transform:uppercase; }
  .lang-btn.active { background:var(--white); color:var(--sky); box-shadow:var(--shadow-sm); }

  /* Categorie (unica barra rimasta) */
  .cat-bar {
    position: fixed; top:59px; left:0; right:0; z-index:298;
    background: rgba(255,255,255,0.98);
    border-bottom: 1px solid var(--border);
    display: flex; gap:7px; padding:8px 20px;
    overflow-x: auto; scrollbar-width:none;
  }
  .cat-bar::-webkit-scrollbar { display:none; }
  .cat-btn {
    display:flex; align-items:center; gap:5px;
    padding:6px 14px; border-radius:20px;
    border:1.5px solid var(--border); background:var(--white);
    font-size:12px; font-weight:500; color:var(--ink-mid);
    cursor:pointer; white-space:nowrap;
    font-family:'Outfit',sans-serif; transition:all 0.18s; flex-shrink:0;
  }
  .cat-btn:hover { border-color:var(--sky); color:var(--sky); }
  .cat-btn.active { background:var(--sky); border-color:var(--sky); color:var(--white); box-shadow:0 2px 10px rgba(26,58,92,0.22); }

  /* Main */
  .main {
    flex:1; display:flex; flex-direction:column; align-items:center;
    padding: 148px 20px 148px;
  }

  /* Hero */
  .hero { text-align:center; margin-bottom:44px; }
  .hero.hidden { display:none; }
  .hero-eyebrow { font-size:10px; font-weight:600; letter-spacing:3.5px; text-transform:uppercase; color:var(--gold); margin-bottom:14px; animation:fadeUp 0.6s 0.1s ease both; }
  .hero-logo-big { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:14px; animation:fadeUp 0.6s 0.2s ease both; }
  .hero-mark {
    width:52px; height:52px; border-radius:16px;
    background: linear-gradient(135deg, var(--sky) 0%, #2a5a8c 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 24px rgba(26,58,92,0.25);
    position:relative; overflow:hidden; flex-shrink:0;
  }
  .hero-mark::after { content:''; position:absolute; bottom:-6px; right:-6px; width:22px; height:22px; background:var(--gold); border-radius:50%; opacity:0.6; }
  .hero-mark svg { position:relative; z-index:1; }
  .hero-title { font-family:'Cormorant Garamond',serif; font-size:56px; font-weight:600; color:var(--ink); letter-spacing:-1.5px; line-height:1; }
  .hero-title em { font-style:italic; color:var(--gold); }
  .hero-divider { width:40px; height:1.5px; margin:16px auto; background:linear-gradient(90deg,transparent,var(--gold),transparent); animation:fadeUp 0.6s 0.3s ease both; }
  .hero-sub { font-size:15px; color:var(--ink-soft); font-weight:300; line-height:1.5; animation:fadeUp 0.6s 0.35s ease both; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  /* Chat */
  .chat-area { width:100%; max-width:660px; display:flex; flex-direction:column; gap:18px; }
  .msg { animation:fadeUp 0.28s ease both; }

  .msg-user { text-align:right; }
  .msg-user span {
    display:inline-block; background:var(--sky); color:var(--white);
    padding:11px 18px; border-radius:20px 20px 4px 20px;
    font-size:14px; max-width:82%; text-align:left; line-height:1.6;
    box-shadow:0 4px 14px rgba(26,58,92,0.20);
  }

  .msg-ai-wrap { max-width:660px; }
  .msg-ai {
    font-size:14px; line-height:1.80; color:var(--ink);
    background:var(--white); border:1px solid var(--border);
    border-radius:4px 20px 20px 20px;
    padding:16px 20px; box-shadow:var(--shadow-sm);
  }
  .msg-ai strong { color:var(--sky); }

  .msg-footer { display:flex; align-items:center; gap:8px; margin-top:8px; }
  .source-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; background:rgba(26,58,92,0.06); color:var(--sky); }
  .btn-copy-msg {
    display:inline-flex; align-items:center; gap:4px;
    padding:3px 10px; border-radius:20px; border:1px solid var(--border);
    background:var(--white); font-size:11px; font-weight:500; color:var(--ink-soft);
    cursor:pointer; transition:all 0.18s; font-family:'Outfit',sans-serif;
  }
  .btn-copy-msg:hover { border-color:var(--sky); color:var(--sky); }
  .btn-copy-msg.copied { background:var(--sky); color:var(--white); border-color:var(--sky); }

  .cat-divider { display:flex; align-items:center; gap:10px; margin:4px 0 2px; font-size:10px; font-weight:600; color:var(--gold); letter-spacing:1.5px; text-transform:uppercase; }
  .cat-divider::before, .cat-divider::after { content:''; flex:1; height:1px; background:rgba(184,134,11,0.2); }

  .typing { background:var(--white); border:1px solid var(--border); border-radius:4px 20px 20px 20px; padding:16px 20px; display:flex; gap:6px; align-items:center; width:fit-content; box-shadow:var(--shadow-sm); }
  .dot { width:6px; height:6px; background:var(--border); border-radius:50%; animation:pulse 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.35)}}

  .footer-info { text-align:center; font-size:11px; color:var(--ink-soft); margin-top:28px; }
  .footer-info a { color:var(--ink-soft); text-decoration:none; }
  .footer-info a:hover { color:var(--gold); }

  /* Input bar */
  .input-bar {
    position:fixed; bottom:0; left:0; right:0; z-index:300;
    background:rgba(255,255,255,0.97); backdrop-filter:blur(16px);
    border-top:1px solid var(--border);
    padding:12px 16px 18px;
    display:flex; justify-content:center;
    box-shadow:0 -4px 20px rgba(0,0,0,0.06);
  }
  .input-wrap {
    width:100%; max-width:660px;
    display:flex; align-items:center;
    background:var(--white); border:1.5px solid var(--border);
    border-radius:28px; padding:0 6px 0 20px; height:52px;
    box-shadow:var(--shadow-md); transition:border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap:focus-within { border-color:var(--sky); box-shadow:0 4px 20px rgba(26,58,92,0.12); }
  .input-wrap input { flex:1; border:none; outline:none; font-family:'Outfit',sans-serif; font-size:15px; color:var(--ink); background:transparent; }
  .input-wrap input::placeholder { color:#C8C8C8; }
  .btn-send {
    width:40px; height:40px; border-radius:50%;
    background:linear-gradient(135deg, var(--sky) 0%, #2a5a8c 100%);
    border:none; color:var(--white);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
    box-shadow:0 2px 10px rgba(26,58,92,0.28); transition:all 0.2s;
  }
  .btn-send:hover { background:linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%); box-shadow:0 4px 16px rgba(184,134,11,0.35); transform:scale(1.04); }
  .btn-send:hover svg { transform:translateX(2px); }
  .btn-send svg { transition:transform 0.2s; }
</style>
</head>
<body>

<div class="top-stripe"></div>

<!-- Header -->
<div class="header">
  <div class="logo" onclick="window.scrollTo(0,0)">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C8 2 4 5.5 4 10c0 5.5 8 12 8 12s8-6.5 8-12c0-4.5-4-8-8-8z" fill="white" opacity="0.9"/>
        <circle cx="12" cy="10" r="3" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div class="logo-text-wrap">
      <div class="logo-name">Modica<span>AI</span></div>
      <div class="logo-tagline">Modica · Sicilia</div>
    </div>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang(this,'it')">IT</button>
    <button class="lang-btn" onclick="setLang(this,'en')">EN</button>
  </div>
</div>

<!-- Categorie -->
<div class="cat-bar">
  <button class="cat-btn active" onclick="setCategoria(this,'tutto')">✨ Tutto</button>
  <button class="cat-btn" onclick="setCategoria(this,'meteo')">🌤 Meteo</button>
  <button class="cat-btn" onclick="setCategoria(this,'ristoranti')">🍽 Ristoranti</button>
  <button class="cat-btn" onclick="setCategoria(this,'turismo')">🏛 Turismo</button>
  <button class="cat-btn" onclick="setCategoria(this,'storia')">📜 Storia</button>
  <button class="cat-btn" onclick="setCategoria(this,'farmacia')">💊 Farmacie</button>
  <button class="cat-btn" onclick="setCategoria(this,'hotel')">🏨 Hotel</button>
  <button class="cat-btn" onclick="setCategoria(this,'bar')">☕ Bar</button>
</div>

<!-- Main -->
<div class="main">
  <div class="hero" id="hero">
    <div class="hero-eyebrow">Assistente AI · Modica, Sicilia</div>
    <div class="hero-logo-big">
      <div class="hero-mark">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C8 2 4 5.5 4 10c0 5.5 8 12 8 12s8-6.5 8-12c0-4.5-4-8-8-8z" fill="white" opacity="0.9"/>
          <circle cx="12" cy="10" r="3" fill="white" opacity="0.55"/>
        </svg>
      </div>
      <div class="hero-title">Modica<em>AI</em></div>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-sub" id="heroSub">Il tuo assistente locale per Modica</div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="footer-info">
    <a href="https://modicaai.it">modicaai.it</a> &nbsp;·&nbsp; Modica, Sicilia &nbsp;·&nbsp;
    © 2026 ModicaAI — <a href="mailto:info@modicaai.it">info@modicaai.it</a>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <div class="input-wrap">
    <input type="text" id="searchInput" placeholder="Chiedimi qualcosa..." autocomplete="off">
    <button class="btn-send" onclick="ask(document.getElementById('searchInput').value)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
</div>

<script>
const API_URL = "https://modicaai-api.onrender.com";
let lang = 'it', categoriaAttiva = 'tutto';

const PLACEHOLDER = {
  tutto:'Chiedimi qualcosa...', meteo:'Che tempo fa a Modica?',
  ristoranti:'Consigliami un ristorante...', turismo:'Cosa vedere a Modica?',
  storia:'Storia di Modica...', farmacia:'Farmacia di turno?',
  hotel:'Dove dormire a Modica?', bar:'Migliori bar a Modica?'
};

function setLang(btn, l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setCategoria(btn, cat) {
  categoriaAttiva = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').placeholder = PLACEHOLDER[cat] || 'Chiedimi qualcosa...';
  document.getElementById('searchInput').focus();
}

function formatText(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\* /g,'• ').replace(/\n/g,'<br>');
}

const copyIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;

function addMessage(type, html, badge, raw) {
  const area = document.getElementById('chatArea');
  document.getElementById('hero').classList.add('hidden');
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  if (type === 'user') {
    div.innerHTML = `<span>${html}</span>`;
  } else {
    const cid = 'c' + Date.now();
    div.innerHTML = `
      <div class="msg-ai-wrap">
        <div class="msg-ai">${html}</div>
        <div class="msg-footer">
          <span class="source-badge">${badge}</span>
          <button class="btn-copy-msg" id="${cid}" onclick="copiaMsg(this)">${copyIcon} Copia</button>
        </div>
      </div>`;
    div.querySelector(`#${cid}`).dataset.t = raw || '';
  }
  area.appendChild(div);
  div.scrollIntoView({ behavior:'smooth', block:'end' });
}

function copiaMsg(btn) {
  navigator.clipboard.writeText(btn.dataset.t).then(() => {
    btn.textContent = '✅ Copiato!'; btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = copyIcon + ' Copia'; btn.classList.remove('copied'); }, 2000);
  });
}

function addDivider(label) {
  if (!label) return;
  const div = document.createElement('div');
  div.className = 'cat-divider'; div.textContent = label;
  document.getElementById('chatArea').appendChild(div);
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.id = 'typing'; div.className = 'msg';
  div.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  area.appendChild(div);
  div.scrollIntoView({ behavior:'smooth', block:'end' });
}
function removeTyping() { document.getElementById('typing')?.remove(); }

async function ask(q) {
  q = q.trim(); if (!q) return;
  document.getElementById('searchInput').value = '';

  let domanda = q;
  const hints = { meteo:['meteo','tempo','pioggia','sole','caldo','freddo'], ristoranti:['ristorante','mangiare','cena','pranzo','pizzeria'], turismo:['vedere','visita','monumento','museo'], storia:['storia','origini'], farmacia:['farmacia'], hotel:['hotel','albergo'], bar:['bar','caffe','caffè'] };
  const labels = { meteo:'🌤 Meteo', ristoranti:'🍽 Ristoranti', turismo:'🏛 Turismo', storia:'📜 Storia', farmacia:'💊 Farmacie', hotel:'🏨 Hotel', bar:'☕ Bar' };

  if (categoriaAttiva !== 'tutto') {
    if (!hints[categoriaAttiva]?.some(k => q.toLowerCase().includes(k))) domanda = `${q} — categoria: ${categoriaAttiva}`;
    addDivider(labels[categoriaAttiva]);
  }

  addMessage('user', q, '');
  showTyping();

  try {
    const res = await fetch(`${API_URL}/ask`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({domanda}) });
    const data = await res.json();
    removeTyping();
    addMessage('ai', formatText(data.risposta), '🤖 ModicaAI', data.risposta);
  } catch {
    removeTyping();
    addMessage('ai', 'Errore di connessione. Riprova.', '🤖 ModicaAI', '');
  }
}

document.getElementById('searchInput').onkeydown = e => { if (e.key === 'Enter') ask(e.target.value); };
</script>
</body>
</html>
