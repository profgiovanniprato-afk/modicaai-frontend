<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModicaAI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #FAFAFA; color: #1A1A2E; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: rgba(250,250,250,0.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid #EFEFEF;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; height: 52px;
  }
  .header-logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #1A3A5C; letter-spacing: -0.5px; cursor: pointer; }
  .header-logo span { color: #C8860A; }
  .lang-toggle { display: flex; gap: 4px; background: #EFEFEF; border-radius: 8px; padding: 3px; }
  .lang-btn { padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: #888; transition: all 0.18s; font-family: 'DM Sans', sans-serif; }
  .lang-btn.active { background: #fff; color: #1A3A5C; font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.10); }

  /* ── Tab Modica / Lavoro ── */
  .section-tabs {
    position: fixed; top: 52px; left: 0; right: 0; z-index: 199;
    background: rgba(250,250,250,0.97); backdrop-filter: blur(6px);
    border-bottom: 1px solid #EFEFEF;
    display: flex; padding: 0 20px;
  }
  .section-tab {
    padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; background: transparent; color: #AAA;
    border-bottom: 2px solid transparent; transition: all 0.18s;
    font-family: 'DM Sans', sans-serif; margin-bottom: -1px;
  }
  .section-tab.active { color: #1A3A5C; border-bottom-color: #1A3A5C; }

  /* ── Categorie (solo sezione Modica) ── */
  .cat-bar {
    position: fixed; top: 100px; left: 0; right: 0; z-index: 198;
    background: rgba(250,250,250,0.97); backdrop-filter: blur(6px);
    border-bottom: 1px solid #F0F0F0;
    display: flex; gap: 8px; padding: 8px 16px;
    overflow-x: auto; scrollbar-width: none;
    transition: opacity 0.2s;
  }
  .cat-bar.hidden { opacity: 0; pointer-events: none; }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid #E0E0E0; background: #fff;
    font-size: 12px; font-weight: 500; color: #666;
    cursor: pointer; white-space: nowrap;
    font-family: 'DM Sans', sans-serif; transition: all 0.18s; flex-shrink: 0;
  }
  .cat-btn:hover { border-color: #1A3A5C; color: #1A3A5C; }
  .cat-btn.active { background: #1A3A5C; border-color: #1A3A5C; color: #fff; }

  /* ── Suggerimenti Lavoro ── */
  .suggestions {
    position: fixed; top: 100px; left: 0; right: 0; z-index: 198;
    background: rgba(250,250,250,0.97); backdrop-filter: blur(6px);
    border-bottom: 1px solid #F0F0F0;
    display: flex; gap: 8px; padding: 8px 16px;
    overflow-x: auto; scrollbar-width: none;
    transition: opacity 0.2s;
  }
  .suggestions.hidden { opacity: 0; pointer-events: none; }
  .suggestions::-webkit-scrollbar { display: none; }
  .sug-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid #E0E0E0; background: #fff;
    font-size: 12px; font-weight: 500; color: #666;
    cursor: pointer; white-space: nowrap;
    font-family: 'DM Sans', sans-serif; transition: all 0.18s; flex-shrink: 0;
  }
  .sug-btn:hover { border-color: #C8860A; color: #C8860A; background: #FFF8F0; }

  /* ── Main ── */
  .main {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 160px 20px 140px;
  }

  /* Hero */
  .hero { text-align: center; margin-bottom: 36px; }
  .hero.hidden { display: none; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 700; color: #1A3A5C; letter-spacing: -1px; }
  .hero-title span { color: #C8860A; }
  .hero-sub { font-size: 15px; color: #AAA; font-weight: 300; margin-top: 6px; }

  /* Chat */
  .chat-area { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 18px; }
  .msg { animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg-user { text-align: right; }
  .msg-user span { display: inline-block; background: #1A3A5C; color: #fff; padding: 10px 16px; border-radius: 18px 18px 4px 18px; font-size: 14px; max-width: 82%; text-align: left; line-height: 1.55; }
  .msg-ai { font-size: 14px; line-height: 1.78; color: #222; max-width: 640px; }
  .msg-ai strong { color: #1A3A5C; }
  .source-badge { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; background: #EAF2F8; color: #1A3A5C; }

  /* Copia risposta AI */
  .btn-copy-msg {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 6px; margin-left: 8px;
    padding: 3px 10px; border-radius: 20px;
    border: 1.5px solid #E0E0E0; background: #fff;
    font-size: 11px; font-weight: 500; color: #999;
    cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif;
  }
  .btn-copy-msg:hover { border-color: #1A3A5C; color: #1A3A5C; }
  .btn-copy-msg.copied { background: #1A3A5C; color: #fff; border-color: #1A3A5C; }

  /* Separatore categoria */
  .cat-divider { display: flex; align-items: center; gap: 10px; margin: 6px 0 2px; font-size: 11px; font-weight: 600; color: #C8860A; letter-spacing: 0.5px; text-transform: uppercase; }
  .cat-divider::before, .cat-divider::after { content:''; flex:1; height:1px; background:#F0E8D8; }

  /* Typing */
  .typing { display: flex; gap: 5px; align-items: center; height: 28px; }
  .dot { width: 6px; height: 6px; background: #C0C8D4; border-radius: 50%; animation: pulse 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,60%,100%{opacity:.3;transform:scale(1);} 30%{opacity:1;transform:scale(1.3);} }

  /* Footer */
  .footer-info { text-align: center; font-size: 11px; color: #CCC; margin-top: 24px; padding-bottom: 4px; }
  .footer-info a { color: #CCC; text-decoration: none; }

  /* ── Input fisso ── */
  .input-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(250,250,250,0.97); backdrop-filter: blur(8px);
    border-top: 1px solid #EFEFEF; padding: 12px 16px 16px;
    display: flex; justify-content: center;
  }
  .input-wrap {
    width: 100%; max-width: 640px; display: flex; align-items: center;
    background: #fff; border: 1.5px solid #E0E0E0; border-radius: 28px;
    padding: 0 8px 0 20px; height: 52px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap:focus-within { border-color: #1A3A5C; box-shadow: 0 4px 20px rgba(26,58,92,0.14); }
  .input-wrap input { flex:1; border:none; outline:none; font-family:'DM Sans',sans-serif; font-size:15px; color:#1A1A2E; background:transparent; }
  .input-wrap input::placeholder { color: #C0C0C0; }
  .btn-send { width:38px; height:38px; border-radius:50%; background:#1A3A5C; border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.18s; flex-shrink:0; }
  .btn-send:hover { background: #C8860A; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo" onclick="resetView()">Modica<span>AI</span></div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang(this,'it')">IT</button>
    <button class="lang-btn" onclick="setLang(this,'en')">EN</button>
  </div>
</div>

<!-- Tab Modica / Lavoro -->
<div class="section-tabs">
  <button class="section-tab active" onclick="switchSection(this,'modica')">🏛 Modica</button>
  <button class="section-tab" onclick="switchSection(this,'lavoro')">💼 Lavoro</button>
</div>

<!-- Categorie Modica -->
<div class="cat-bar" id="catBar">
  <button class="cat-btn active" onclick="setCategoria(this,'tutto')">✨ Tutto</button>
  <button class="cat-btn" onclick="setCategoria(this,'meteo')">🌤 Meteo</button>
  <button class="cat-btn" onclick="setCategoria(this,'ristoranti')">🍽 Ristoranti</button>
  <button class="cat-btn" onclick="setCategoria(this,'turismo')">🏛 Turismo</button>
  <button class="cat-btn" onclick="setCategoria(this,'storia')">📜 Storia</button>
  <button class="cat-btn" onclick="setCategoria(this,'farmacia')">💊 Farmacie</button>
  <button class="cat-btn" onclick="setCategoria(this,'hotel')">🏨 Hotel</button>
  <button class="cat-btn" onclick="setCategoria(this,'bar')">☕ Bar</button>
</div>

<!-- Suggerimenti Lavoro -->
<div class="suggestions hidden" id="suggestions">
  <button class="sug-btn" onclick="inserisci('Scrivimi una mail formale al Comune di Modica per ')">✉️ Mail al Comune</button>
  <button class="sug-btn" onclick="inserisci('Scrivimi una mail professionale a ')">✉️ Mail professionale</button>
  <button class="sug-btn" onclick="inserisci('Scrivimi un messaggio WhatsApp per ')">💬 Messaggio WA</button>
  <button class="sug-btn" onclick="inserisci('Fammi un riassunto di questo testo: ')">📄 Riassumi testo</button>
  <button class="sug-btn" onclick="inserisci('Cercami informazioni su ')">🔍 Ricerca</button>
  <button class="sug-btn" onclick="inserisci('Scrivimi un preventivo per ')">📋 Preventivo</button>
</div>

<!-- Main -->
<div class="main" id="main">
  <div class="hero" id="hero">
    <div class="hero-title">Modica<span>AI</span></div>
    <div class="hero-sub" id="heroSub">Il tuo assistente locale per Modica</div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="footer-info">
    <a href="https://modicaai.it">modicaai.it</a> &nbsp;·&nbsp; Modica, Sicilia &nbsp;·&nbsp;
    © 2026 ModicaAI — <a href="mailto:info@modicaai.it">info@modicaai.it</a>
  </div>
</div>

<!-- Input fisso -->
<div class="input-bar">
  <div class="input-wrap">
    <input type="text" id="searchInput" placeholder="Chiedimi qualcosa su Modica..." autocomplete="off">
    <button class="btn-send" onclick="ask(document.getElementById('searchInput').value)">→</button>
  </div>
</div>

<script>
const API_URL = "https://modicaai-api.onrender.com";

let lang = 'it';
let sezione = 'modica';
let categoriaAttiva = 'tutto';

const PLACEHOLDER = {
  modica: {
    tutto: 'Chiedimi qualcosa su Modica...',
    meteo: 'Che tempo fa a Modica?',
    ristoranti: 'Consigliami un ristorante...',
    turismo: 'Cosa vedere a Modica?',
    storia: 'Dimmi della storia di Modica...',
    farmacia: 'Farmacia di turno?',
    hotel: 'Dove dormire a Modica?',
    bar: 'Migliori bar a Modica?',
  },
  lavoro: 'Scrivi una mail, cerca qualcosa, riassumi un testo...',
};

const SYSTEM_LAVORO = `Sei un assistente professionale tuttofare. 
- Se ti chiedono di scrivere una mail: produci la mail completa con oggetto, corpo e saluti
- Se ti chiedono di scrivere un messaggio: produci solo il testo del messaggio, pronto da inviare
- Se ti chiedono una ricerca: rispondi in modo chiaro, accurato e ben strutturato
- Se ti chiedono un riassunto: riassumi in modo fedele e conciso
- Per mail formali a enti pubblici: usa un linguaggio burocratico corretto
- Rispondi direttamente con il contenuto richiesto, senza preamboli o spiegazioni
- Rispondi nella stessa lingua della domanda`;

// ── Sezione ────────────────────────────────────────────────────────────────────
function switchSection(btn, s) {
  sezione = s;
  document.querySelectorAll('.section-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('catBar').classList.toggle('hidden', s !== 'modica');
  document.getElementById('suggestions').classList.toggle('hidden', s !== 'lavoro');
  aggiornaPlaceholder();
  document.getElementById('searchInput').focus();

  if (s === 'lavoro') {
    document.getElementById('heroSub').textContent = 'Mail, messaggi, ricerche e riassunti';
  } else {
    document.getElementById('heroSub').textContent = 'Il tuo assistente locale per Modica';
  }
}

function resetView() {
  switchSection(document.querySelector('.section-tab'), 'modica');
}

// ── Lingua ────────────────────────────────────────────────────────────────────
function setLang(btn, l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  aggiornaPlaceholder();
}

function aggiornaPlaceholder() {
  const ph = sezione === 'lavoro'
    ? PLACEHOLDER.lavoro
    : (PLACEHOLDER.modica[categoriaAttiva] || PLACEHOLDER.modica.tutto);
  document.getElementById('searchInput').placeholder = ph;
}

// ── Categorie Modica ──────────────────────────────────────────────────────────
function setCategoria(btn, cat) {
  categoriaAttiva = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  aggiornaPlaceholder();
  document.getElementById('searchInput').focus();
}

// ── Suggerimenti rapidi Lavoro ────────────────────────────────────────────────
function inserisci(testo) {
  const input = document.getElementById('searchInput');
  input.value = testo;
  input.focus();
  input.setSelectionRange(testo.length, testo.length);
}

// ── Chat ──────────────────────────────────────────────────────────────────────
function formatText(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\* /g, '• ')
    .replace(/\n/g, '<br>');
}

function addMessage(type, html, badge, testoOriginale) {
  const area = document.getElementById('chatArea');
  document.getElementById('hero').classList.add('hidden');
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  if (type === 'user') {
    div.innerHTML = `<span>${html}</span>`;
  } else {
    const copyId = 'copy_' + Date.now();
    div.innerHTML = `
      <div class="msg-ai">${html}</div>
      <div>
        <span class="source-badge">${badge}</span>
        <button class="btn-copy-msg" id="${copyId}" onclick="copiaRisposta('${copyId}', this)">📋 Copia</button>
      </div>`;
    // Salva testo originale per copia
    div.querySelector(`#${copyId}`).dataset.testo = testoOriginale || '';
  }
  area.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function copiaRisposta(id, btn) {
  const testo = btn.dataset.testo;
  navigator.clipboard.writeText(testo).then(() => {
    btn.textContent = '✅ Copiato!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copia'; btn.classList.remove('copied'); }, 2000);
  });
}

function addDivider(label) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'cat-divider';
  div.textContent = label;
  area.appendChild(div);
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.id = 'typing'; div.className = 'msg msg-ai typing';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  area.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}
function removeTyping() { document.getElementById('typing')?.remove(); }

async function ask(q) {
  q = q.trim();
  if (!q) return;
  document.getElementById('searchInput').value = '';

  let domanda = q;
  let badge = '🤖 ModicaAI';

  if (sezione === 'modica') {
    // Aggiungi contesto categoria se necessario
    const hints = {
      meteo: ['meteo','tempo','pioggia','sole','caldo','freddo'],
      ristoranti: ['ristorante','mangiare','cena','pranzo'],
      turismo: ['vedere','visita','monumento','museo'],
      storia: ['storia','origini'],
      farmacia: ['farmacia','medicina'],
      hotel: ['hotel','albergo','dormire'],
      bar: ['bar','caffe','caffè'],
    };
    if (categoriaAttiva !== 'tutto') {
      const hasHint = hints[categoriaAttiva]?.some(k => q.toLowerCase().includes(k));
      if (!hasHint) domanda = `${q} — categoria: ${categoriaAttiva}`;
      const labels = { meteo:'🌤 Meteo', ristoranti:'🍽 Ristoranti', turismo:'🏛 Turismo', storia:'📜 Storia', farmacia:'💊 Farmacie', hotel:'🏨 Hotel', bar:'☕ Bar' };
      addDivider(labels[categoriaAttiva]);
    }
  } else {
    // Sezione lavoro: inietta system prompt nel prompt
    domanda = `${SYSTEM_LAVORO}\n\nRichiesta: ${q}`;
    badge = '💼 Lavoro';
    addDivider('💼 Lavoro');
  }

  addMessage('user', q, '');
  showTyping();

  try {
    const res = await fetch(`${API_URL}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domanda }),
    });
    const data = await res.json();
    removeTyping();
    addMessage('ai', formatText(data.risposta), badge, data.risposta);
  } catch {
    removeTyping();
    addMessage('ai', 'Errore di connessione. Riprova tra qualche secondo.', badge, '');
  }
}

document.getElementById('searchInput').onkeydown = e => { if (e.key === 'Enter') ask(e.target.value); };
</script>
</body>
</html>
