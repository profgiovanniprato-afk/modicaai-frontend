<style>
  :root {
    --white:    #FFFFFF;
    --bg:       #F8F8F8;
    --gold:     #B8860B;
    --gold-lt:  #D4A017;
    --terra:    #C1440E;
    --sky:      #1A3A5C;
    --ink:      #1A1A1A;
    --ink-mid:  #555555;
    --ink-soft: #999999;
    --border:   #EBEBEB;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  }
  body.dark {
    --white:    #1E2330;
    --bg:       #151820;
    --gold:     #D4A017;
    --gold-lt:  #E8B824;
    --sky:      #4A8FBF;
    --ink:      #E8E8E8;
    --ink-mid:  #AAAAAA;
    --ink-soft: #777777;
    --border:   #2E3448;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  }
  body.dark .header { background:rgba(21,24,32,0.97); }
  body.dark .input-bar { background:rgba(21,24,32,0.97); }
  body.dark .input-wrap { background:var(--white); }
  body.dark .lang-toggle { background:var(--bg); }
  body.dark .lang-btn.active { background:var(--white); }
  body.dark .btn-new-chat { background:var(--white); }
  body.dark .msg-ai { background:var(--white); }
  body.dark .typing { background:var(--white); }
  body.dark .btn-copy-msg { background:var(--white); }
  body.dark .news-ticker { background:#0f1218; border-bottom:1px solid rgba(255,255,255,0.05); }
  body.dark .fuel-ticker { background:#0f1218; border-bottom:1px solid rgba(255,255,255,0.05); }

  /* Ticker carburanti */
  .fuel-ticker {
    position: fixed; top:32px; left:0; right:0; z-index:499;
    height: 28px;
    background: #1a1a2e;
    display: flex; align-items: center;
    overflow: hidden;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .fuel-ticker .ticker-label {
    background: #e63946;
    font-size: 9px;
    padding: 0 10px;
  }
  .fuel-ticker .ticker-track {
    animation: ticker-scroll 50s linear infinite;
  }
  .fuel-ticker .ticker-item {
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    padding: 0 24px;
  }
  .fuel-ticker .ticker-item strong {
    color: #ffd166;
    font-weight: 700;
  }
  .fuel-ticker .ticker-item:hover { color: #ffd166; }


  /* ── Chip suggerimenti hero ── */
  .chips-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    max-width: 540px; margin: 18px auto 0;
    animation: fadeUp 0.5s 0.3s ease both;
  }
  .chip {
    padding: 7px 14px; border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white); color: var(--ink-mid);
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.18s;
    font-family: 'Outfit', sans-serif;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--sky); color: var(--sky); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  body.dark .chip { background: var(--white); border-color: var(--border); color: var(--ink-mid); }
  body.dark .chip:hover { border-color: var(--sky); color: var(--sky); }

  /* ── Pulsanti msg footer extra ── */
  .btn-voice { color: var(--sky) !important; }
  .btn-voice:hover { background: rgba(30,144,255,.08) !important; }
  .btn-share { color: #8b5cf6 !important; }
  .btn-share:hover { background: rgba(139,92,246,.08) !important; }

  /* ── Chip suggerimenti — hover vocale ── */
  .btn-dark[id="btnVoice"] { transition: opacity 0.2s; }

  /* Toggle dark mode */
  .btn-dark { width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--white); color:var(--ink-mid); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; flex-shrink:0; }
  .btn-dark:hover { border-color:var(--sky); color:var(--sky); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; }

  .top-stripe { position:fixed; top:60px; left:0; right:0; height:3px; z-index:400; background:linear-gradient(90deg,var(--sky),var(--gold),var(--terra),var(--gold),var(--sky)); background-size:300% 100%; animation:stripe 6s linear infinite; }
  @keyframes stripe{0%{background-position:0%}100%{background-position:300%}}

  .header { position:fixed; top:63px; left:0; right:0; z-index:300; height:56px; background:rgba(255,255,255,0.96); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 24px; box-shadow:var(--shadow-sm); }

  .logo { display:flex; align-items:center; gap:10px; cursor:pointer; }
  .logo-mark { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,var(--sky) 0%,#2a5a8c 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(26,58,92,0.30); position:relative; overflow:hidden; flex-shrink:0; }
  .logo-mark::after { content:''; position:absolute; bottom:-4px; right:-4px; width:14px; height:14px; background:var(--gold); border-radius:50%; opacity:0.7; }
  .logo-mark svg { position:relative; z-index:1; }
  .logo-text-wrap { display:flex; flex-direction:column; line-height:1; }
  .logo-name { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; color:var(--ink); letter-spacing:0.3px; }
  .logo-name span { color:var(--gold); }
  .logo-tagline { font-size:9px; font-weight:500; letter-spacing:1.8px; text-transform:uppercase; color:var(--ink-soft); margin-top:1px; }

  .header-right { display:flex; align-items:center; gap:10px; }
  .lang-toggle { display:flex; gap:2px; background:var(--bg); border-radius:8px; padding:3px; border:1px solid var(--border); }
  .lang-btn { padding:4px 11px; border-radius:6px; font-size:11px; font-weight:600; letter-spacing:0.5px; cursor:pointer; border:none; background:transparent; color:var(--ink-soft); transition:all 0.18s; font-family:'Outfit',sans-serif; text-transform:uppercase; }
  .lang-btn.active { background:var(--white); color:var(--sky); box-shadow:var(--shadow-sm); }

  /* Pulsante nuova chat */
  .btn-new-chat { display:flex; align-items:center; gap:5px; padding:6px 12px; border-radius:8px; border:1px solid var(--border); background:var(--white); font-size:12px; font-weight:500; color:var(--ink-mid); cursor:pointer; font-family:'Outfit',sans-serif; transition:all 0.18s; }
  .btn-new-chat:hover { border-color:var(--sky); color:var(--sky); }


  /* Main */
  .main { flex:1; display:flex; flex-direction:column; align-items:center; padding:120px 20px 148px; }

  /* Hero */
  .hero { text-align:center; margin-bottom:36px; }
  .hero.hidden { display:none; }
  .hero-eyebrow { font-size:10px; font-weight:600; letter-spacing:3.5px; text-transform:uppercase; color:var(--gold); margin-bottom:14px; animation:fadeUp 0.6s 0.1s ease both; }
  .hero-logo-big { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:14px; animation:fadeUp 0.6s 0.2s ease both; }
  .hero-mark { width:52px; height:52px; border-radius:16px; background:linear-gradient(135deg,var(--sky) 0%,#2a5a8c 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 6px 24px rgba(26,58,92,0.25); position:relative; overflow:hidden; flex-shrink:0; }
  .hero-mark::after { content:''; position:absolute; bottom:-6px; right:-6px; width:22px; height:22px; background:var(--gold); border-radius:50%; opacity:0.6; }
  .hero-mark svg { position:relative; z-index:1; }
  .hero-title { font-family:'Cormorant Garamond',serif; font-size:56px; font-weight:600; color:var(--ink); letter-spacing:-1.5px; line-height:1; }
  .hero-title em { font-style:italic; color:var(--gold); }
  .hero-divider { width:40px; height:1.5px; margin:16px auto; background:linear-gradient(90deg,transparent,var(--gold),transparent); animation:fadeUp 0.6s 0.3s ease both; }
  .hero-sub { font-size:15px; color:var(--ink-soft); font-weight:300; line-height:1.5; animation:fadeUp 0.6s 0.35s ease both; }

  /* Suggerimenti iniziali */
  .suggestions-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:660px; margin-bottom:8px; animation:fadeUp 0.6s 0.45s ease both; }
  @media(max-width:480px){ .suggestions-grid{grid-template-columns:1fr;} }
  .sug-card { background:var(--white); border:1.5px solid var(--border); border-radius:14px; padding:14px 16px; cursor:pointer; transition:all 0.2s; text-align:left; font-family:'Outfit',sans-serif; }
  .sug-card:hover { border-color:var(--sky); box-shadow:var(--shadow-md); transform:translateY(-1px); }
  .sug-card-icon { font-size:20px; margin-bottom:6px; }
  .sug-card-title { font-size:13px; font-weight:600; color:var(--ink); margin-bottom:2px; }
  .sug-card-sub { font-size:11px; color:var(--ink-soft); }

  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* Chat */
  .chat-area { width:100%; max-width:660px; display:flex; flex-direction:column; gap:18px; }
  .msg { animation:fadeUp 0.28s ease both; }
  .msg-user { text-align:right; }
  .msg-user span { display:inline-block; background:var(--sky); color:var(--white); padding:11px 18px; border-radius:20px 20px 4px 20px; font-size:14px; max-width:82%; text-align:left; line-height:1.6; box-shadow:0 4px 14px rgba(26,58,92,0.20); }
  .msg-ai-wrap { max-width:660px; }
  .msg-ai { font-size:14px; line-height:1.80; color:var(--ink); background:var(--white); border:1px solid var(--border); border-radius:4px 20px 20px 20px; padding:16px 20px; box-shadow:var(--shadow-sm); }
  .msg-ai strong { color:var(--sky); }
  .msg-footer { display:flex; align-items:center; gap:8px; margin-top:8px; }
  .source-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; background:rgba(26,58,92,0.06); color:var(--sky); }
  .btn-copy-msg { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; border:1px solid var(--border); background:var(--white); font-size:11px; font-weight:500; color:var(--ink-soft); cursor:pointer; transition:all 0.18s; font-family:'Outfit',sans-serif; }
  .btn-copy-msg:hover { border-color:var(--sky); color:var(--sky); }
  .btn-copy-msg.copied { background:var(--sky); color:var(--white); border-color:var(--sky); }
  .cat-divider { display:flex; align-items:center; gap:10px; margin:4px 0 2px; font-size:10px; font-weight:600; color:var(--gold); letter-spacing:1.5px; text-transform:uppercase; }
  .cat-divider::before,.cat-divider::after{content:'';flex:1;height:1px;background:rgba(184,134,11,0.2)}
  .typing { background:var(--white); border:1px solid var(--border); border-radius:4px 20px 20px 20px; padding:16px 20px; display:flex; gap:6px; align-items:center; width:fit-content; box-shadow:var(--shadow-sm); }
  .dot { width:6px; height:6px; background:var(--border); border-radius:50%; animation:pulse 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.35)}}

  .footer-info { text-align:center; font-size:11px; color:var(--ink-soft); margin-top:28px; }
  .footer-info a { color:var(--ink-soft); text-decoration:none; }
  .footer-info a:hover { color:var(--gold); }

  /* Input bar */
  .input-bar { position:fixed; bottom:0; left:0; right:0; z-index:300; background:rgba(255,255,255,0.97); backdrop-filter:blur(16px); border-top:1px solid var(--border); padding:12px 16px 18px; display:flex; justify-content:center; box-shadow:0 -4px 20px rgba(0,0,0,0.06); }
  .input-wrap { width:100%; max-width:660px; display:flex; align-items:center; background:var(--white); border:1.5px solid var(--border); border-radius:28px; padding:0 6px 0 20px; height:52px; box-shadow:var(--shadow-md); transition:border-color 0.2s,box-shadow 0.2s; }
  .input-wrap:focus-within { border-color:var(--sky); box-shadow:0 4px 20px rgba(26,58,92,0.12); }
  .input-wrap input { flex:1; border:none; outline:none; font-family:'Outfit',sans-serif; font-size:15px; color:var(--ink); background:transparent; }
  .input-wrap input::placeholder { color:#C8C8C8; }
  .btn-send { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--sky) 0%,#2a5a8c 100%); border:none; color:var(--white); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; box-shadow:0 2px 10px rgba(26,58,92,0.28); transition:all 0.2s; }
  .btn-enhance {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--ink-mid);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
    font-size: 15px;
    position: relative;
  }
  .btn-enhance:hover { border-color: var(--gold); color: var(--gold); transform: scale(1.08); }
  .btn-enhance.loading { pointer-events: none; opacity: 0.6; }
  .btn-enhance.loading::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border: 2px solid var(--gold);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  body.dark .btn-enhance { border-color: var(--border); background: var(--white); color: var(--ink-mid); }
  .btn-send:hover { background:linear-gradient(135deg,var(--gold) 0%,var(--gold-lt) 100%); box-shadow:0 4px 16px rgba(184,134,11,0.35); transform:scale(1.04); }
  .btn-send svg { transition:transform 0.2s; }
  .btn-send:hover svg { transform:translateX(2px); }

  /* ── News Ticker ── */
  .news-ticker {
    position: fixed; top:0; left:0; right:0; z-index:500;
    height: 32px;
    background: var(--sky);
    display: flex; align-items: center;
    overflow: hidden;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .ticker-label {
    flex-shrink: 0;
    background: var(--gold);
    color: #fff;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 0 12px; height: 100%;
    display: flex; align-items: center;
    z-index: 1;
  }
  .ticker-track-wrap {
    flex: 1; overflow: hidden; position: relative;
  }
  .ticker-track {
    display: flex; gap: 0;
    white-space: nowrap;
    animation: ticker-scroll 40s linear infinite;
    will-change: transform;
  }
  .ticker-track:hover { animation-play-state: paused; }
  .ticker-item {
    display: inline-flex; align-items: center;
    font-size: 12px; color: rgba(255,255,255,0.90);
    padding: 0 32px; cursor: pointer;
    transition: color 0.18s;
    text-decoration: none;
  }
  .ticker-item:hover { color: var(--gold-lt); }
  .ticker-item::after {
    content: '·';
    margin-left: 32px;
    opacity: 0.4;
  }
  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

</style>
</head>
<body>


<!-- News Ticker -->
<div class="fuel-ticker" id="fuelTicker">
  <div class="ticker-label" onclick="mostraCarburanti()" title="Clicca per vedere i prezzi in chat" style="cursor:pointer;">⛽ Carburanti</div>
  <div class="ticker-track-wrap">
    <div class="ticker-track" id="fuelTrack">
      <span class="ticker-item">Caricamento prezzi...</span>
    </div>
  </div>
</div>
<div class="news-ticker" id="newsTicker">
  <div class="ticker-label">📰 News</div>
  <div class="ticker-track-wrap">
    <div class="ticker-track" id="tickerTrack">
      <span class="ticker-item">Caricamento notizie...</span>
    </div>
  </div>
</div>

<div class="top-stripe"></div>

<div class="header">
  <div class="logo" onclick="nuovaChat()">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C8 2 4 5.5 4 10c0 5.5 8 12 8 12s8-6.5 8-12c0-4.5-4-8-8-8z" fill="white" opacity="0.9"/>
        <circle cx="12" cy="10" r="3" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div class="logo-text-wrap">
      <div class="logo-name">Modica<span>AI</span></div>
      <div class="logo-tagline">Modica · Sicilia</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-new-chat" onclick="nuovaChat()" title="Nuova conversazione">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuova chat
    </button>
    <button class="btn-dark" id="btnVoice" onclick="toggleVoice()" title="Attiva risposta vocale automatica" style="opacity:0.45">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </button>
    <button class="btn-dark" id="btnDark" onclick="toggleDark()" title="Dark mode">
      <svg id="iconDark" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
    </button>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang(this,'it')">IT</button>
      <button class="lang-btn" onclick="setLang(this,'en')">EN</button>
    </div>
  </div>
</div>


<div class="main">
  <div class="hero" id="hero">
    <div class="hero-eyebrow">Assistente AI · Modica, Sicilia</div>
    <div class="hero-logo-big">
      <div class="hero-mark">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C8 2 4 5.5 4 10c0 5.5 8 12 8 12s8-6.5 8-12c0-4.5-4-8-8-8z" fill="white" opacity="0.9"/>
          <circle cx="12" cy="10" r="3" fill="white" opacity="0.55"/>
        </svg>
      </div>
      <div class="hero-title">Modica<em>AI</em></div>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-sub">Il tuo assistente locale per Modica</div>
  </div>

  <!-- Chip suggerimenti -->
  <div class="chips-grid" id="chipsGrid">
    <button class="chip" onclick="askChip(this,'Dove conviene fare benzina oggi?')">⛽ Benzina più economica</button>
    <button class="chip" onclick="askChip(this,'Quali sono le ultime notizie di oggi?')">📰 Ultime notizie</button>
    <button class="chip" onclick="askChip(this,'Che tempo fa oggi a Modica?')">🌤️ Meteo oggi</button>
    <button class="chip" onclick="askChip(this,'Quali ristoranti mi consigli?')">🍽️ Ristoranti</button>
    <button class="chip" onclick="askChip(this,'Farmacia di turno adesso?')">💊 Farmacia di turno</button>
    <button class="chip" onclick="askChip(this,'Genera un immagine del barocco siciliano')">🎨 Genera immagine</button>
  </div>

  <!-- Suggerimenti iniziali -->
  <div class="suggestions-grid" id="suggestionsGrid" style="display:none"></div>

  <div class="chat-area" id="chatArea"></div>
  <div class="footer-info">
    <a href="https://modicaai.it">modicaai.it</a> &nbsp;·&nbsp; Modica, Sicilia &nbsp;·&nbsp;
    © 2026 ModicaAI — <a href="mailto:infomodicaai@gmail.com">infomodicaai@gmail.com</a>
  </div>
</div>

<div class="input-bar">
  <div class="input-wrap">
    <input type="text" id="searchInput" placeholder="Chiedimi qualcosa..." autocomplete="off">
    <button class="btn-enhance" id="btnEnhance" onclick="enhancePrompt()" title="✨ Ottimizza prompt con AI">
      ✨
    </button>
    <button class="btn-send" onclick="ask(document.getElementById('searchInput').value)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
</div>

<script>
const API_URL = "https://modicaai-api.onrender.com";
let lang = 'it';
let cronologia = [];
let SESSION_ID = null;
let userLat = null;
let userLon = null;
let voiceEnabled = false;
let speechSynth = window.speechSynthesis || null;
let currentUtterance = null;

// ── Init sessione server-side ─────────────────────────────────────
(async () => {
  try {
    const r = await fetch(API_URL + '/session/new');
    const d = await r.json();
    SESSION_ID = d.session_id;
  } catch(e) {
    SESSION_ID = 'local-' + Math.random().toString(36).slice(2);
  }
})();

// ── Geolocalizzazione silente all'avvio ───────────────────────────
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      console.log('Posizione utente:', userLat, userLon);
    },
    () => { /* negata o non disponibile — usiamo Modica default */ },
    { timeout: 5000, maximumAge: 60000 }
  );
}

// ── Utilità ──────────────────────────────────────────────────────
function setLang(btn, l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function nuovaChat() {
  cronologia = [];
  if (speechSynth) speechSynth.cancel();
  // Rigenera session_id per nuova conversazione
  fetch(API_URL + '/session/new').then(r => r.json()).then(d => { SESSION_ID = d.session_id; }).catch(() => {});
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('hero').classList.remove('hidden');
  const grid = document.getElementById('chipsGrid');
  if (grid) grid.style.display = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchInput').placeholder = 'Chiedimi qualcosa...';
}

function formatText(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\* /g,'• ').replace(/\n/g,'<br>');
}

const copyIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;

function addMessage(type, html, badge, raw) {
  document.getElementById('hero').classList.add('hidden');
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  if (type === 'user') {
    div.innerHTML = `<span>${html}</span>`;
  } else {
    const cid = 'c' + Date.now();
    const vid = 'v' + Date.now();
    const sid = 's' + Date.now();
    const hasVoice = !!speechSynth;
    const voiceBtn = hasVoice
      ? `<button class="btn-copy-msg btn-voice" id="${vid}" onclick="leggiAdAlta(this)" title="Ascolta">${voiceIcon} Ascolta</button>`
      : '';
    const shareBtn = (navigator.share || navigator.clipboard)
      ? `<button class="btn-copy-msg btn-share" id="${sid}" onclick="condividiRisposta(this)" title="Condividi">${shareIcon} Condividi</button>`
      : '';
    div.innerHTML = `
      <div class="msg-ai-wrap">
        <div class="msg-ai">${html}</div>
        <div class="msg-footer">
          <span class="source-badge">${badge}</span>
          <button class="btn-copy-msg" id="${cid}" onclick="copiaMsg(this)">${copyIcon} Copia</button>
          ${voiceBtn}
          ${shareBtn}
        </div>
      </div>`;
    div.querySelector('#' + cid).dataset.t = raw || '';
    if (hasVoice) div.querySelector('#' + vid).dataset.t = raw || '';
    if (navigator.share || navigator.clipboard) div.querySelector('#' + sid).dataset.t = raw || '';
    // Leggi automaticamente se voce attivata dall'utente
    if (voiceEnabled && raw) setTimeout(() => leggiTesto(raw), 200);
  }
  area.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function copiaMsg(btn) {
  navigator.clipboard.writeText(btn.dataset.t).then(() => {
    btn.textContent = '✅ Copiato!';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = copyIcon + ' Copia'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Icone extra ────────────────────────────────────────────────────
const voiceIcon = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
const shareIcon = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`;
const stopIcon  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>`;

// ── Risposta vocale (Web Speech API) ──────────────────────────────
function leggiTesto(testo) {
  if (!speechSynth) return;
  speechSynth.cancel();
  currentUtterance = new SpeechSynthesisUtterance(testo);
  currentUtterance.lang = lang === 'it' ? 'it-IT' : 'en-US';
  currentUtterance.rate = 1.0;
  currentUtterance.pitch = 1.0;
  const voci = speechSynth.getVoices();
  const voceLocale = voci.find(v => v.lang.startsWith(currentUtterance.lang));
  if (voceLocale) currentUtterance.voice = voceLocale;
  speechSynth.speak(currentUtterance);
}

function leggiAdAlta(btn) {
  const t = btn.dataset.t;
  if (!t) return;
  if (speechSynth && speechSynth.speaking) {
    speechSynth.cancel();
    btn.innerHTML = voiceIcon + ' Ascolta';
    return;
  }
  btn.innerHTML = stopIcon + ' Stop';
  leggiTesto(t);
  if (currentUtterance) {
    currentUtterance.onend  = () => { btn.innerHTML = voiceIcon + ' Ascolta'; };
    currentUtterance.onerror = () => { btn.innerHTML = voiceIcon + ' Ascolta'; };
  }
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('btnVoice');
  if (btn) {
    btn.style.opacity = voiceEnabled ? '1' : '0.45';
    btn.title = voiceEnabled ? 'Risposta vocale attiva — clicca per disattivare' : 'Attiva risposta vocale automatica';
  }
}

// ── Condivisione risposta ─────────────────────────────────────────
async function condividiRisposta(btn) {
  const t = btn.dataset.t;
  if (!t) return;
  const testo = `ModicaAI risponde:\n\n${t}\n\n👉 modicaai.it`;
  if (navigator.share) {
    try {
      await navigator.share({ title: 'ModicaAI', text: testo, url: 'https://modicaai.it' });
      return;
    } catch(e) { /* fallback clipboard */ }
  }
  navigator.clipboard.writeText(testo).then(() => {
    btn.innerHTML = '✓ Copiato';
    setTimeout(() => { btn.innerHTML = shareIcon + ' Condividi'; }, 2000);
  });
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.id = 'typing'; div.className = 'msg';
  div.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  area.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

// ── Rilevamento richieste immagine ────────────────────────────────
function isRichiestaImmagine(q) {
  const kw = ['crea immagine','genera immagine','disegna','illustra','crea una foto','genera una foto','crea un immagine','genera un immagine','fammi vedere','mostrami un','dipingi','visualizza','immagine di','foto di','create an image','generate an image','draw','paint','show me a picture','make a photo'];
  return kw.some(k => q.toLowerCase().includes(k));
}

// ── Chat principale ───────────────────────────────────────────────
function askChip(btn, domanda) {
  const grid = document.getElementById('chipsGrid');
  if (grid) grid.style.display = 'none';
  ask(domanda);
}

async function ask(q) {
  q = q.trim();
  if (!q) return;
  document.getElementById('searchInput').value = '';

  if (isRichiestaImmagine(q)) {
    generaImmagine(q);
    return;
  }

  if (typeof gtag !== 'undefined') gtag('event', 'domanda', { event_category: 'chat' });

  addMessage('user', q, '');
  showTyping();
  cronologia.push({ role: 'user', content: q });

  try {
    const res = await fetch(API_URL + '/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domanda: q, cronologia: cronologia.slice(0, -1) })
    });
    const data = await res.json();
    removeTyping();
    addMessage('ai', formatText(data.risposta), 'ModicaAI', data.risposta);
    cronologia.push({ role: 'assistant', content: data.risposta });
    if (cronologia.length > 20) cronologia = cronologia.slice(-20);
  } catch (e) {
    removeTyping();
    addMessage('ai', 'Errore di connessione. Riprova.', 'ModicaAI', '');
  }
}

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') ask(this.value);
});

// ── Genera Immagine (Pollinations AI) ──────────────────────────────
async function generaImmagine(prompt) {
  addMessage('user', prompt, '');
  showTyping();
  try {
    const res = await fetch(API_URL + '/genera-immagine', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    removeTyping();
    if (data.immagine) {
      const html = `<img src="data:image/jpeg;base64,${data.immagine}" style="max-width:100%;border-radius:12px;margin-top:4px;" alt="Immagine generata"><br><small style="color:var(--ink-soft)">Generata con Pollinations AI · FLUX</small>`;
      addMessage('ai', html, 'Pollinations', '');
    } else {
      addMessage('ai', data.error || 'Errore nella generazione.', 'Pollinations', '');
    }
  } catch (e) {
    removeTyping();
    addMessage('ai', 'Errore di connessione durante la generazione.', 'Pollinations', '');
  }
}

// ── Carburanti ───────────────────────────────────────────────────
// ── Ticker carburanti (avvio automatico) ─────────────────────────
async function caricaCarburantiFuel() {
  try {
    const res = await fetch(API_URL + '/carburanti');
    const data = await res.json();
    if (!data.stazioni || !data.stazioni.length) return;

    const tipiOrdine = ['Benzina_self','Gasolio_self','GPL_self','Metano_self','Benzina_servito','Gasolio_servito'];
    const track = document.getElementById('fuelTrack');
    if (!track) return;

    let items = '';
    data.stazioni.forEach(s => {
      const prezziOrdinati = tipiOrdine.map(k => s.prezzi[k]).filter(Boolean);
      prezziOrdinati.forEach(p => {
        items += `<span class="ticker-item"><strong>${s.nome}</strong> &nbsp;${p.carburante} ${p.tipo}: <strong>${p.prezzo.toFixed(3)} €/L</strong> <small>(${s.dist} km)</small></span>`;
      });
    });

    if (!items) return;
    // Duplica per scorrimento continuo senza salti
    track.innerHTML = items + items;
    // Adatta velocità animazione alla quantità di contenuto
    const totalWidth = track.scrollWidth / 2;
    const speed = Math.max(30, Math.round(totalWidth / 80));
    track.style.animationDuration = speed + 's';
  } catch (e) {
    // Ticker silenzioso in caso di errore
  }
}

// ── Ottimizza Prompt ─────────────────────────────────────────────
async function enhancePrompt() {
  const input = document.getElementById('searchInput');
  const btn = document.getElementById('btnEnhance');
  const testo = input.value.trim();

  if (!testo) {
    input.placeholder = 'Scrivi prima un testo da ottimizzare...';
    input.focus();
    setTimeout(() => { input.placeholder = 'Chiedimi qualcosa...'; }, 2000);
    return;
  }

  btn.classList.add('loading');
  btn.textContent = '';

  try {
    const res = await fetch(API_URL + '/ottimizza-prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: testo, lang })
    });
    const data = await res.json();
    if (data.prompt_ottimizzato) {
      input.value = '';
      const testo_new = data.prompt_ottimizzato;
      let i = 0;
      const write = setInterval(() => {
        input.value += testo_new[i];
        i++;
        if (i >= testo_new.length) {
          clearInterval(write);
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      }, 18);
    } else {
      input.value = data.error || testo;
    }
  } catch (e) {
    // In caso di errore lascia il testo originale
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '✨';
  }
}

async function mostraCarburanti() {
  addMessage('user', '⛽ Prezzi carburanti vicino a Modica', '');
  showTyping();
  try {
    const res = await fetch(API_URL + '/carburanti');
    const data = await res.json();
    removeTyping();
    if (!data.stazioni || !data.stazioni.length) {
      addMessage('ai', 'Nessuna stazione trovata nel raggio. ' + (data.error || ''), 'Carburanti', '');
      return;
    }
    const tipiOrdine = ['Benzina_self','Gasolio_self','GPL_self','Metano_self','Benzina_servito','Gasolio_servito'];
    let html = '<strong>⛽ Stazioni carburante vicine a Modica</strong><br><br>';
    data.stazioni.forEach(s => {
      html += `<strong>${s.nome}</strong> — ${s.comune} (${s.dist} km)<br>`;
      const prezziOrdinati = tipiOrdine.map(k => s.prezzi[k]).filter(Boolean);
      prezziOrdinati.forEach(p => {
        html += `&nbsp;&nbsp;• ${p.carburante} <em>${p.tipo}</em>: <strong>${p.prezzo.toFixed(3)} €/L</strong><br>`;
      });
      html += '<br>';
    });
    html += `<small style="color:var(--ink-soft)">${data.aggiornamento}</small>`;
    addMessage('ai', html, 'MiMIT', '');
  } catch (e) {
    removeTyping();
    addMessage('ai', 'Errore nel recupero prezzi carburanti.', 'Carburanti', '');
  }
}

// ── Dark Mode ────────────────────────────────────────────────────
const sunIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
const moonIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>`;

function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('btnDark').innerHTML = isDark ? sunIcon : moonIcon;
  try { localStorage.setItem('modicaai-dark', isDark ? '1' : '0'); } catch(e) {}
  const tm = document.querySelector('meta[name="theme-color"]');
  if (tm) tm.setAttribute('content', isDark ? '#151820' : '#1A3A5C');
}

(function() {
  try {
    if (localStorage.getItem('modicaai-dark') === '1') {
      document.body.classList.add('dark');
      const btn = document.getElementById('btnDark');
      if (btn) btn.innerHTML = sunIcon;
      const tm = document.querySelector('meta[name="theme-color"]');
      if (tm) tm.setAttribute('content', '#151820');
    }
  } catch(e) {}
})();

// ── News Ticker RSS ──────────────────────────────────────────────
async function caricaNotizie() {
  try {
    const res = await fetch(API_URL + '/news');
    const data = await res.json();
    if (!data.items || !data.items.length) return;

    const track = document.getElementById('tickerTrack');
    track.innerHTML = '';
    const allItems = [...data.items, ...data.items];
    allItems.forEach(item => {
      const a = document.createElement('a');
      a.className = 'ticker-item';
      a.textContent = item.title;
      a.href = item.link || '#';
      a.target = '_blank';
      a.rel = 'noopener';
      track.appendChild(a);
    });

    requestAnimationFrame(() => {
      const totalWidth = track.scrollWidth / 2;
      const speed = Math.max(30, Math.round(totalWidth / 80));
      track.style.animationDuration = speed + 's';
    });
  } catch(e) {
    console.warn('Ticker news error:', e);
  }
}

caricaNotizie();
caricaCarburantiFuel();

</script>
</body>
</html>
